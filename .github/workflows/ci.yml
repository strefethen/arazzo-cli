name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    name: Rust
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: . -> target

      - name: Format
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Test
        run: cargo test --workspace

      - name: Performance baseline (non-blocking)
        continue-on-error: true
        run: bash scripts/ci/perf-baseline.sh "$RUNNER_TEMP/arazzo-perf"

      - name: Upload performance baseline artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: perf-baseline-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/arazzo-perf
          if-no-files-found: warn

      - name: Publish performance summary
        if: always()
        run: |
          if [ -f "$RUNNER_TEMP/arazzo-perf/summary.md" ]; then
            cat "$RUNNER_TEMP/arazzo-perf/summary.md" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "No performance summary produced." >> "$GITHUB_STEP_SUMMARY"
          fi

  vscode-extension:
    name: VSCode Extension
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install extension dependencies
        run: npm install
        working-directory: vscode-arazzo-debug

      - name: Typecheck extension
        run: npm run lint
        working-directory: vscode-arazzo-debug

      - name: Build extension
        run: npm run build
        working-directory: vscode-arazzo-debug
