name: VS Code Extension Release

on:
  push:
    tags:
      - "vscode-v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g., vscode-v0.0.1)"
        required: true
        type: string

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RELEASE_TAG: ${{ github.ref_type == 'tag' && github.ref_name || inputs.tag }}

jobs:
  build:
    name: Build VSIX (${{ matrix.vsce_target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            vsce_target: linux-x64
            exe_suffix: ""
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            vsce_target: linux-arm64
            exe_suffix: ""
            cross: true
          - os: macos-latest
            target: aarch64-apple-darwin
            vsce_target: darwin-arm64
            exe_suffix: ""
          - os: macos-latest
            target: x86_64-apple-darwin
            vsce_target: darwin-x64
            exe_suffix: ""
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            vsce_target: win32-x64
            exe_suffix: ".exe"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install aarch64 linker (Linux ARM64 only)
        if: matrix.cross
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: . -> target

      - name: Build DAP binary
        shell: bash
        run: cargo build --release -p arazzo-debug-adapter --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: ${{ matrix.cross && 'aarch64-linux-gnu-gcc' || '' }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install extension dependencies
        working-directory: vscode-arazzo-debug
        run: npm ci

      - name: Copy binary into extension
        shell: bash
        run: |
          mkdir -p vscode-arazzo-debug/bin
          cp "target/${{ matrix.target }}/release/arazzo-debug-adapter${{ matrix.exe_suffix }}" \
             "vscode-arazzo-debug/bin/arazzo-debug-adapter${{ matrix.exe_suffix }}"

      - name: Build extension TypeScript
        working-directory: vscode-arazzo-debug
        run: npm run build

      - name: Package platform-specific VSIX
        working-directory: vscode-arazzo-debug
        run: npx @vscode/vsce package --no-dependencies --target ${{ matrix.vsce_target }} -o "arazzo-debug-${{ matrix.vsce_target }}.vsix"

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: vsix-${{ matrix.vsce_target }}
          path: vscode-arazzo-debug/arazzo-debug-${{ matrix.vsce_target }}.vsix
          if-no-files-found: error

  publish:
    name: Publish to Marketplace
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: vsix-*
          merge-multiple: true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install vsce
        run: npm install -g @vscode/vsce

      - name: Publish all platform targets
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        shell: bash
        run: |
          for vsix in arazzo-debug-*.vsix; do
            echo "Publishing $vsix"
            vsce publish --packagePath "$vsix"
          done

  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: vsix-*
          merge-multiple: true

      - name: Generate checksums
        shell: bash
        run: sha256sum arazzo-debug-*.vsix > SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: |
            arazzo-debug-*.vsix
            SHA256SUMS.txt
          generate_release_notes: true
